# Source weights for the sentiment engine.
#
# The planning doc specifies that trade publications and SEC filings should be
# weighted higher than social chatter. Tune these as observed performance evolves.

sentiment_weights:
  sec_filings: 1.0      # Highest signal — regulatory filings carry material information
  news_trade: 1.0       # Trade publications (Reuters, Bloomberg, sector-specific)
  news_general: 0.7     # General finance news
  social_reddit: 0.4    # r/stocks, r/wallstreetbets, sector subs
  social_twitter: 0.3   # Cashtag mentions

